# Wenn Sie unter GitHub „Releases“ eine neue Version veröffentlichen, wird die JAR gebaut und an diese Release angehängt.
name: Release – JAR erstellen und anhängen

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  attach-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Release-Beschreibung aus release-notes setzen (falls Datei zum Tag existiert)
        env:
          RELEASE_URL: ${{ github.event.release.url }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FILE="release-notes/${TAG_NAME}.md"
          if [[ ! -f "$FILE" ]]; then
            echo "Keine $FILE — Beschreibung unverändert."
            exit 0
          fi
          BODY=$(jq -n --rawfile body "$FILE" '{body: $body}')
          curl -sS -f -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$RELEASE_URL" \
            -d "$BODY"
          echo "Release-Beschreibung aus $FILE gesetzt."

      - name: mvnw ausführbar machen
        run: chmod +x mvnw

      - name: JDK 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: JAR bauen
        run: ./mvnw -B clean package -DskipTests

      - name: Zweite Datei mit festem Namen (stabil für Download-Link „neueste Version“)
        run: |
          set -e
          jar=$(ls target/visustruct-*.jar | head -1)
          cp "$jar" visustruct.jar

      - name: An die veröffentlichte Release anhängen
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/visustruct-*.jar
            visustruct.jar
