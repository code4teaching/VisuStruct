name: Java CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: mvnw ausführbar machen
        run: chmod +x mvnw
      - name: JDK 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"
      - name: Mit Maven bauen
        run: ./mvnw -B clean package --file pom.xml
